<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Live Web Voice Assistant Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --neon-blue: #00f0ff;
      --neon-purple: #bd00ff;
      --neon-red: #ff0055;
      --text-main: #f5f5f7;
      --text-muted: #8e8e93;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 36px 24px;
      width: 100%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    h1 {
      font-weight: 800;
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-align: center;
    }

    /* Visualizer */
    .visualizer-container {
      width: 100%;
      height: 100px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #visualizerCanvas {
      width: 100%;
      height: 100%;
      border-radius: 12px;
    }

    /* Controls */
    .control-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      outline: none;
    }

    .control-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .control-btn svg {
      width: 40px;
      height: 40px;
      fill: var(--text-main);
      transition: transform 0.3s ease;
    }

    .control-btn.active {
      background: linear-gradient(135deg, var(--neon-red), #ff5e00);
      box-shadow: 0 0 35px rgba(255, 0, 85, 0.6);
    }

    .control-btn.active svg {
      transform: rotate(45deg);
    }

    .status-text {
      margin-top: 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--neon-blue);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      min-height: 20px;
    }

    .transcription-box {
      margin-top: 32px;
      width: 100%;
      max-height: 120px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-main);
      text-align: left;
    }

    /* Configuration Panel */
    .config-panel {
      width: 100%;
      margin-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
      display: none;
    }

    .config-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .config-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .config-group input, .config-group select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      color: var(--text-main);
      font-family: inherit;
      outline: none;
      font-size: 13px;
    }

    .config-group input:focus, .config-group select:focus {
      border-color: var(--neon-blue);
    }

    .toggle-config {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
      outline: none;
    }

    .toggle-config:hover {
      color: var(--neon-blue);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Gemini Live Tester</h1>
      <p class="subtitle">Direct Web-Browser Speech-to-Speech Connection</p>

      <div class="visualizer-container">
        <canvas id="visualizerCanvas"></canvas>
      </div>

      <button id="toggleBtn" class="control-btn">
        <!-- Mic Icon -->
        <svg id="micIcon" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
        </svg>
      </button>

      <div id="status" class="status-text">Disconnected</div>

      <div id="transcription" class="transcription-box">
        Say something or click the button to start the connection...
      </div>

      <button id="configToggleBtn" class="toggle-config">Show API Configuration</button>

      <div id="configPanel" class="config-panel">
        <div class="config-group">
          <label for="apiKeyInput">Gemini API Key</label>
          <input type="password" id="apiKeyInput" placeholder="Enter Google AI Studio Key">
        </div>
        <div class="config-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="gemini-3.5-flash">gemini-3.5-flash</option>
            <option value="gemini-3.1-flash-live-preview">gemini-3.1-flash-live-preview</option>
            <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp</option>
            <option value="gemini-2.0-flash-live-preview">gemini-2.0-flash-live-preview</option>
          </select>
        </div>
        <div class="config-group">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect">
            <option value="Puck">Puck</option>
            <option value="Charon">Charon</option>
            <option value="Kore">Kore</option>
            <option value="Fenrir">Fenrir</option>
            <option value="Aoede">Aoede</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('toggleBtn');
    const configToggleBtn = document.getElementById('configToggleBtn');
    const configPanel = document.getElementById('configPanel');
    const statusText = document.getElementById('status');
    const transcriptionBox = document.getElementById('transcription');
    const canvas = document.getElementById('visualizerCanvas');
    const canvasCtx = canvas.getContext('2d');

    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelSelect = document.getElementById('modelSelect');
    const voiceSelect = document.getElementById('voiceSelect');

    let ws = null;
    let isConnected = false;
    let audioContext = null;
    let recordContext = null;
    let pcmPlayer = null;
    let micStream = null;
    let recordProcessor = null;
    let micAnalyser = null;
    let animationFrameId = null;

    // Set canvas dimensions
    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth * window.devicePixelRatio;
      canvas.height = canvas.parentElement.clientHeight * window.devicePixelRatio;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Fetch integration configuration from Home Assistant API
    async function fetchConfig() {
      try {
        statusText.innerText = "Loading Config...";
        const response = await fetch('/api/gemini_live/config');
        if (response.ok) {
          const config = await response.json();
          if (config.api_key) {
            apiKeyInput.value = config.api_key;
            modelSelect.value = config.model || 'gemini-3.5-flash';
            voiceSelect.value = config.voice || 'Puck';
            statusText.innerText = "Config Loaded";
            setTimeout(() => { statusText.innerText = "Disconnected"; }, 2000);
            return;
          }
        }
      } catch (err) {
        console.warn("Failed to load HA integration config, will require manual input:", err);
      }
      statusText.innerText = "Disconnected";
    }
    fetchConfig();

    // Toggle configuration panel visibility
    configToggleBtn.addEventListener('click', () => {
      if (configPanel.style.display === 'none' || configPanel.style.display === '') {
        configPanel.style.display = 'block';
        configToggleBtn.innerText = 'Hide API Configuration';
      } else {
        configPanel.style.display = 'none';
        configToggleBtn.innerText = 'Show API Configuration';
      }
    });

    // PCM Output Player Class
    class PCMPlayer {
      constructor(sampleRate = 24000) {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        this.sampleRate = sampleRate;
        this.startTime = this.audioCtx.currentTime;

        // Analyser for output visualization
        this.analyser = this.audioCtx.createAnalyser();
        this.analyser.fftSize = 256;
        this.analyser.connect(this.audioCtx.destination);
      }

      feed(pcmBytes) {
        const int16Array = new Int16Array(pcmBytes.buffer, pcmBytes.byteOffset, pcmBytes.byteLength / 2);
        const float32Array = new Float32Array(int16Array.length);
        for (let i = 0; i < int16Array.length; i++) {
          float32Array[i] = int16Array[i] / 32768.0;
        }

        const audioBuffer = this.audioCtx.createBuffer(1, float32Array.length, this.sampleRate);
        audioBuffer.getChannelData(0).set(float32Array);

        const bufferSource = this.audioCtx.createBufferSource();
        bufferSource.buffer = audioBuffer;
        bufferSource.connect(this.analyser);

        const now = this.audioCtx.currentTime;
        if (this.startTime < now) {
          this.startTime = now;
        }
        bufferSource.start(this.startTime);
        this.startTime += audioBuffer.duration;
      }

      close() {
        this.audioCtx.close();
      }
    }

    // Convert ArrayBuffer to base64
    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return window.btoa(binary);
    }

    // Start Recording and Streaming
    async function startConnection() {
      const apiKey = apiKeyInput.value.trim();
      const model = modelSelect.value;
      const voice = voiceSelect.value;

      if (!apiKey) {
        alert("Please enter a Gemini API Key first.");
        return;
      }

      statusText.innerText = "Connecting...";
      toggleBtn.disabled = true;

      const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${apiKey}`;

      try {
        ws = new WebSocket(wsUrl);
      } catch (err) {
        alert("Failed to initialize WebSocket: " + err.message);
        statusText.innerText = "Disconnected";
        toggleBtn.disabled = false;
        return;
      }

      ws.onopen = async () => {
        _log("WebSocket connection established. Configuring session...");
        statusText.innerText = "Configuring...";

        // Send Setup message with Home Assistant intent execution tool
        const setupMsg = {
          setup: {
            model: `models/${model}`,
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: {
                voiceConfig: {
                  prebuiltVoiceConfig: {
                    voiceName: voice
                  }
                }
              }
            },
            tools: [
              {
                functionDeclarations: [
                  {
                    name: "execute_home_assistant_intent",
                    description: "Execute a command to control Home Assistant devices (e.g. turn on/off lights, open/close covers, set temperature, check status, etc.).",
                    parameters: {
                      type: "OBJECT",
                      properties: {
                        command: {
                          type: "STRING",
                          description: "The natural language instruction to execute (e.g., 'turn off living room lights')."
                        }
                      },
                      required: ["command"]
                    }
                  }
                ]
              }
            ]
          }
        };

        ws.send(JSON.stringify(setupMsg));
      };

      ws.onmessage = async (event) => {
        const data = JSON.parse(event.data);

        if (data.setupComplete) {
          _log("Gemini Live session configured. Initializing audio capturing...");
          statusText.innerText = "Connected & Active";
          toggleBtn.disabled = false;
          toggleBtn.classList.add('active');
          isConnected = true;

          // Start audio components
          await initAudioCapture();
          pcmPlayer = new PCMPlayer(24000);
          drawVisualizer();
        }

        // Handle Tool Calls (Smart Home Control) from browser
        if (data.toolCall) {
          const functionCalls = data.toolCall.functionCalls || [];
          for (const call of functionCalls) {
            if (call.name === "execute_home_assistant_intent") {
              const callId = call.id;
              const commandStr = call.args.command;
              _log("Executing Home Assistant tool: " + commandStr);
              statusText.innerText = "Executing Tool...";

              try {
                // Call Home Assistant REST API using automatic browser credentials
                const response = await fetch('/api/conversation/process', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    text: commandStr,
                    agent_id: "conversation.home_assistant"
                  })
                });

                let speechText = "Command executed successfully";
                if (response.ok) {
                  const result = await response.json();
                  if (result.response && result.response.speech && result.response.speech.plain) {
                    speechText = result.response.speech.plain.speech;
                  }
                } else {
                  speechText = "Failed to communicate with Home Assistant";
                }

                _log("Tool response: " + speechText);
                statusText.innerText = "Connected & Active";

                // Send response back to Gemini Live WebSocket
                ws.send(JSON.stringify({
                  toolResponse: {
                    functionResponses: [
                      {
                        response: {
                          output: speechText
                        },
                        id: callId
                      }
                    ]
                  }
                }));
              } catch (err) {
                _log("Error executing tool: " + err.message);
                ws.send(JSON.stringify({
                  toolResponse: {
                    functionResponses: [
                      {
                        response: {
                          output: "Error executing command: " + err.message
                        },
                        id: callId
                      }
                    ]
                  }
                }));
                statusText.innerText = "Connected & Active";
              }
            }
          }
        }

        if (data.serverContent) {
          const content = data.serverContent;
          if (content.modelTurn) {
            const parts = content.modelTurn.parts || [];
            for (const part of parts) {
              if (part.text) {
                transcriptionBox.innerText = part.text;
              }
              if (part.inlineData) {
                const audioData = part.inlineData.data;
                const binaryString = window.atob(audioData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                  bytes[i] = binaryString.charCodeAt(i);
                }
                pcmPlayer.feed(bytes);
              }
            }
          }
        }
      };

      ws.onclose = (event) => {
        _log("WebSocket connection closed: " + event.reason);
        stopConnection();
      };

      ws.onerror = (event) => {
        _log("WebSocket error encountered.");
        stopConnection();
      };
    }

    async function initAudioCapture() {
      try {
        // Request microphone access at native 16kHz
        recordContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const source = recordContext.createMediaStreamSource(micStream);
        recordProcessor = recordContext.createScriptProcessor(2048, 1, 1);
        micAnalyser = recordContext.createAnalyser();
        micAnalyser.fftSize = 256;

        source.connect(micAnalyser);
        micAnalyser.connect(recordProcessor);

        // Silent route to output to satisfy scripting processor requirements in some browsers
        const silentGain = recordContext.createGain();
        silentGain.gain.value = 0;
        recordProcessor.connect(silentGain);
        silentGain.connect(recordContext.destination);

        recordProcessor.onaudioprocess = (e) => {
          if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) return;

          const float32Data = e.inputBuffer.getChannelData(0);
          const int16Data = new Int16Array(float32Data.length);
          for (let i = 0; i < float32Data.length; i++) {
            const s = Math.max(-1, Math.min(1, float32Data[i]));
            int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }

          const base64Data = arrayBufferToBase64(int16Data.buffer);
          ws.send(JSON.stringify({
            realtimeInput: {
              mediaChunks: [{
                mimeType: "audio/pcm;rate=16000",
                data: base64Data
              }]
            }
          }));
        };
      } catch (err) {
        alert("Failed to gain microphone access: " + err.message);
        stopConnection();
      }
    }

    function stopConnection() {
      statusText.innerText = "Disconnected";
      toggleBtn.classList.remove('active');
      toggleBtn.disabled = false;
      isConnected = false;

      if (ws) {
        if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
          ws.close();
        }
        ws = null;
      }

      // Close recording contexts
      if (recordProcessor) {
        recordProcessor.disconnect();
        recordProcessor = null;
      }
      if (micStream) {
        micStream.getTracks().forEach(track => track.stop());
        micStream = null;
      }
      if (recordContext) {
        recordContext.close();
        recordContext = null;
      }

      // Close playback context
      if (pcmPlayer) {
        pcmPlayer.close();
        pcmPlayer = null;
      }

      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      // Clear visualizer
      canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    }

    toggleBtn.addEventListener('click', () => {
      if (!isConnected) {
        startConnection();
      } else {
        stopConnection();
      }
    });

    function _log(message) {
      console.log(message);
    }

    // Render Sine Wave Audio Visualizer
    function drawVisualizer() {
      if (!isConnected) return;
      animationFrameId = requestAnimationFrame(drawVisualizer);

      const width = canvas.width;
      const height = canvas.height;
      canvasCtx.clearRect(0, 0, width, height);

      // Determine which analyser data to use (Input vs Output)
      let analyser = micAnalyser;
      let waveColor = '#00f0ff'; // Neon Blue for input mic

      // If Gemini speaker is active and playing, switch visualizer color and source
      if (pcmPlayer && pcmPlayer.audioCtx && pcmPlayer.audioCtx.state === 'running') {
        analyser = pcmPlayer.analyser;
        waveColor = '#bd00ff'; // Neon Purple for model output
      }

      if (!analyser) return;

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);

      // Draw elegant neon sine wave
      canvasCtx.lineWidth = 3 * window.devicePixelRatio;
      canvasCtx.strokeStyle = waveColor;
      canvasCtx.shadowBlur = 15;
      canvasCtx.shadowColor = waveColor;
      canvasCtx.beginPath();

      const sliceWidth = width / bufferLength;
      let x = 0;

      for (let i = 0; i < bufferLength; i++) {
        // Map [0, 255] time domain data to height range
        const v = dataArray[i] / 128.0; // 0.0 to 2.0
        const y = (v * height) / 2;

        if (i === 0) {
          canvasCtx.moveTo(x, y);
        } else {
          canvasCtx.lineTo(x, y);
        }

        x += sliceWidth;
      }

      canvasCtx.lineTo(width, height / 2);
      canvasCtx.stroke();
      canvasCtx.shadowBlur = 0; // Reset shadow
    }
  </script>
</body>
</html>
